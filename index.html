  <script>
const defaultConfig = { bg_color: '#0b4d3c', surface_color: '#f0f4f8', text_color: '#1a2332', primary_color: '#0b4d3c', secondary_color: '#e8c547', font_family: 'DM Sans', font_size: 14, company_name: 'TIIB SmartShield', welcome_message: "Hi 👋 I'm your TIIB Insurance Assistant. I can help you find the right coverage in less than a minute. What would you like to insure today?", cta_text: "Would you like a TIIB advisor to contact you with a full quote?" };
const chatScroll = document.getElementById('chat-scroll');
const quickActions = document.getElementById('quick-actions');
const userInput = document.getElementById('user-input');
let leads = [], currentRecordCount = 0, conversationState = 'initial', userData = { name: '', phone: '', email: '', need: '', protection_score: '' }, scoreData = { q1: '', q2: '', q3: '', q4: '', q5: '' }, isMuted = false;
function cfg(k) { return (window.elementSdk && window.elementSdk.config?.[k]) || defaultConfig[k]; }
function refreshIcons() { if (window.lucide?.createIcons) window.lucide.createIcons(); }
function addMessage(text, isUser, options = {}) {
  const div = document.createElement('div');
  div.className = `fade-in flex ${isUser ? 'justify-end' : 'justify-start'}`;
  const bubble = document.createElement('div');
  bubble.className = isUser ? 'chat-bubble-user' : 'chat-bubble-bot';
  bubble.style.maxWidth = '85%'; bubble.style.padding = '12px 16px'; bubble.style.fontSize = `${cfg('font_size')}px`;

function setQuickActions(actions) {

    btn.style.borderColor = cfg('primary_color'); btn.style.color = cfg('primary_color'); btn.style.background = '#fff';

const insuranceTypes = {
  motor: { name: 'Motor Insurance', desc: 'Covers accidents, theft, fire, third-party liability.\n₦25k–₦150k/year' },
  health: { name: 'Health Insurance', desc: 'Covers hospital visits, surgery, medications.\n₦50k–₦500k/year' },
  fire: { name: 'Fire Insurance', desc: 'Protects property against fire, lightning, explosion.' },
  marine: { name: 'Marine Insurance', desc: 'Protects goods in transit and at port.' },
  liability: { name: 'Liability Insurance', desc: 'Covers third-party claims and legal costs.' },
  business: { name: 'Business Insurance', desc: 'Comprehensive protection for business assets, liability, and operations.' }

function detectInsuranceType(t) {
  if (/car|vehicle|motor|accident|drive|driving|auto/.test(t)) return 'motor';
  if (/health|medical|hospital|sick|treatment|healthcare/.test(t)) return 'health';
  if (/fire|property|building|house|office|premises|store|shop/.test(t)) return 'fire';
  if (/marine|goods|cargo|shipping|transit|port|import|export/.test(t)) return 'marine';
  if (/liability|third.party|claim|legal/.test(t)) return 'liability';
  if (/business|company|firm|store|enterprise/.test(t)) return 'business';
  return null;
}
function calculateProtectionScore() {
  let score = 30;
  if (scoreData.q2.toLowerCase().includes('yes')) score += 30;
  if (scoreData.q4.toLowerCase().includes('yes')) score += 20;
  if (scoreData.q5.toLowerCase().includes('yes')) score += 20;
  return Math.min(score, 100);
}
function getScoreInsight(score) {
  if (score <= 40) return { level: 'HIGH RISK ⚠️', meaning: 'You are underinsured and exposed to significant risks.' };
  if (score <= 70) return { level: 'MODERATE PROTECTION ✓', meaning: 'You have some coverage, but there may be gaps.' };
  return { level: 'WELL PROTECTED ✅', meaning: 'You have good coverage. Keep policies active!' };
}
function recommendInsurance(score) {
  if (score <= 40) return 'I recommend starting with Motor or Health Insurance—whichever matches your biggest need.';
  if (score <= 70) return 'Consider adding Fire or Liability Insurance to close coverage gaps.';
  return 'Your coverage looks solid! Keep your policies active and up-to-date.';
}
function processUserMessage(text) {
  const t = text.toLowerCase().trim();
  if (conversationState === 'score_q1') { scoreData.q1 = text.trim(); conversationState = 'score_q2'; botReply("Do you currently have any insurance? (Yes/No)"); return; }

  if (conversationState === 'score_q3') { scoreData.q3 = text.trim(); conversationState = 'score_q4'; botReply("If a loss happens today, can you recover financially? (Yes/No/Partly)"); return; }
  if (conversationState === 'score_q4') { scoreData.q4 = text.trim(); conversationState = 'score_q5'; botReply("Are your current policies active? (Yes/No/Not sure)"); return; }
  if (conversationState === 'score_q5') {
    scoreData.q5 = text.trim();
    const score = calculateProtectionScore();
    const insight = getScoreInsight(score);
    userData.protection_score = score.toString();
    const scoreMsg = `📊 Your Protection Score: ${score}%\n\n${insight.level}\n${insight.meaning}\n\n${recommendInsurance(score)}`;
    botReply(scoreMsg, { actions: [{ label: '💬 Get quote', value: 'Connect me with an advisor' }, { label: '🔍 Learn more', value: 'Tell me more about insurance' }] });
    conversationState = 'initial';
    return;
  }

  const type = detectInsuranceType(t);
  if (type) {
    userData.need = insuranceTypes[type].name;
    const desc = insuranceTypes[type].desc;
    botReply(`🛡️ ${insuranceTypes[type].name}\n${desc}\n\nThis is an estimate. A full quote will be provided by our advisor.`, { actions: [{ label: '💬 Get quote', value: 'Connect me with an advisor' }, { label: '🔍 See more', value: 'Show other types' }] });
    return;
  }
  if (/score|check protection|how protected|assessment/.test(t)) {
    conversationState = 'score_q1';
    botReply("Let's check your protection level with 5 quick questions.\n\nFirst: Are you insuring yourself personally or a business?");
    return;
  }
  if (/connect|advisor|quote|contact|speak|call|ring/.test(t)) {
    conversationState = 'collect_name';
    botReply("Great! I'll connect you with a TIIB advisor. What's your name?");
    return;
  }
  if (/hi|hello|hey|start|help/.test(t)) {
    botReply(cfg('welcome_message'), { actions: [{ label: '🚗 Motor', value: 'I need motor insurance' }, { label: '🏥 Health', value: 'I need health insurance' }, { label: '📊 Check score', value: 'Check my protection score' }] });
    return;
  }
  botReply(`I can help you find the right insurance. Try:\n• "I need motor/health insurance"\n• "Check my protection score"\n• "Connect me with an advisor"\n\n${cfg('cta_text')}`);
}
async function saveLead() {
  if (currentRecordCount >= 999) { botReply("Details saved! An advisor will contact you soon! 🎉"); return; }
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true; sendBtn.style.opacity = '0.5';
  const result = await window.dataSdk.create({ name: userData.name, phone: userData.phone, email: userData.email, insurance_need: userData.need || 'General enquiry', protection_score: userData.protection_score || '', created_at: new Date().toISOString() });
  sendBtn.disabled = false; sendBtn.style.opacity = '1';
  if (result.isOk) { playSuccessSound(); botReply(`✅ Thank you, ${userData.name}! Our advisor will call ${userData.phone} within 24 hours. 🛡️`); } else { botReply("Details saved! An advisor will contact you soon."); }

}
function handleSend() { const text = userInput.value.trim(); if (!text) return; playSendSound(); addMessage(text, true); userInput.value = ''; userInput.style.height = 'auto'; processUserMessage(text); }
userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px'; });

function toggleMute() { isMuted = !isMuted; const muteBtn = document.getElementById('mute-btn'); if (muteBtn) { muteBtn.innerHTML = `<i data-lucide="${isMuted ? 'volume-x' : 'volume-2'}" style="width:18px;height:18px;"></i>`; setTimeout(refreshIcons, 10); } }

  if (window.dataSdk) { const r = await window.dataSdk.init({ onDataChanged(data) { leads = data; currentRecordCount = data.length; } }); }
  if (window.elementSdk) {

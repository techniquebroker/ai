// ---- SPEECH SYNTHESIS ----
function speakText(text) {
  if (!voiceEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[*#🚗🏥🔥🏢📋💡📞📊🛡️✅❌⚠️🕳️🚨💼📦💻📄✉️📞🤲⚖️🚢🌐📧🔒🟡💪😊👋🤝💰🔍📖🔄🤔]/g, '').replace(/\*\*/g, '');
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.lang = 'en-NG';
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female')) || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;
  window.speechSynthesis.speak(utterance);
}

// ---- SPEECH RECOGNITION ----
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-NG';

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById('userInput').value = transcript;
    handleSend();
  };
  recognition.onend = () => { stopListening(); };
  recognition.onerror = () => { stopListening(); };
}

function toggleListening() {
  if (!recognition) {
    showToast("Voice input not supported in this browser");
    return;
  }
  if (isListening) { recognition.stop(); stopListening(); }
  else { recognition.start(); startListening(); }
}

function startListening() {
  isListening = true;
  const btn = document.getElementById('micBtn');
  btn.classList.add('pulse-ring');
  btn.style.background = '#dc2626';
  btn.style.color = '#fff';
}

function stopListening() {
  isListening = false;
  const btn = document.getElementById('micBtn');
  btn.classList.remove('pulse-ring');
  btn.style.background = '';
  btn.style.color = '';
}

// ---- UI HELPERS ----
function formatMessage(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, content, animate = true, buttons = []) {
  const list = document.getElementById('messagesList');
  const div = document.createElement('div');
  div.className = `msg-bubble ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
  if (!animate) div.style.animation = 'none';
  div.innerHTML = formatMessage(content);
  
  // Add button options to bot messages
  if (buttons.length > 0 && role === 'assistant') {
    const btnContainer = document.createElement('div');
    btnContainer.className = 'flex flex-wrap gap-2 mt-3';
    buttons.forEach(btn => {
      const btnEl = document.createElement('button');
      btnEl.className = 'text-xs px-3 py-1.5 rounded-full border border-emerald-700 text-emerald-800 bg-emerald-50 font-medium hover:bg-emerald-100 transition';
      btnEl.textContent = btn.label;
      btnEl.onclick = () => sendMessage(btn.value);
      btnContainer.appendChild(btnEl);
    });
    div.appendChild(btnContainer);
  }
  
  list.appendChild(div);
  scrollToBottom();
  createLucideIcons();
}

function scrollToBottom() {
  const area = document.getElementById('messagesArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function showTyping() { document.getElementById('typingIndicator').classList.remove('hidden'); scrollToBottom(); }
function hideTyping() { document.getElementById('typingIndicator').classList.add('hidden'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-4 py-2 rounded-full shadow-lg z-50';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ---- CORE SEND ----
async function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  sendMessage(text);
  input.value = '';
  input.style.height = 'auto';
}

async function sendMessage(text) {
  if (isProcessing) return;
  isProcessing = true;
  document.getElementById('quickActions').classList.add('hidden');

  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  // Save user message
  await window.dataSdk.create({ role: 'user', content: text, timestamp: new Date().toISOString() });

  showTyping();

  // Simulate thinking delay
  await new Promise(r => setTimeout(r, 800 + Math.random() * 1200));

  const response = generateResponse(text);
  hideTyping();
  
  // Handle response with buttons
  if (typeof response === 'object' && response.text) {
    addMessage('assistant', response.text, true, response.buttons || []);
    chatHistory.push({ role: 'assistant', content: response.text });
    await window.dataSdk.create({ role: 'assistant', content: response.text, timestamp: new Date().toISOString() });
    speakText(response.text);
  } else {
    addMessage('assistant', response);
    chatHistory.push({ role: 'assistant', content: response });
    await window.dataSdk.create({ role: 'assistant', content: response, timestamp: new Date().toISOString() });
    speakText(response);
  }

  isProcessing = false;
}

// ---- CLEAR CHAT ----
async function clearChat() {
  chatHistory = [];
  document.getElementById('messagesList').innerHTML = '';
  document.getElementById('quickActions').classList.remove('hidden');
  window.speechSynthesis.cancel();

  // Delete all records
  for (const rec of allRecords) {
    await window.dataSdk.delete(rec);
  }

  const welcome = (window.elementSdk && window.elementSdk.config && window.elementSdk.config.welcome_message) || defaultConfig.welcome_message;
  addMessage('assistant', welcome);
}

// ---- AUTO RESIZE TEXTAREA ----
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ---- INIT ----
(async function init() {
  // Element SDK
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      const font = config.font_family || defaultConfig.font_family;
      document.getElementById('app').style.fontFamily = `${font}, sans-serif`;
      document.getElementById('app').style.background = config.bg_color || defaultConfig.bg_color;
      document.getElementById('app').style.color = config.text_color || defaultConfig.text_color;
      document.getElementById('header').style.background = `linear-gradient(135deg, ${config.header_color || defaultConfig.header_color} 0%, ${config.accent_color || defaultConfig.accent_color} 100%)`;
      document.getElementById('taglineEl').textContent = config.company_tagline || defaultConfig.company_tagline;

      // Update bot message bubbles
      document.querySelectorAll('.msg-bot').forEach(el => {
        el.style.background = config.surface_color || defaultConfig.surface_color;
        el.style.color = config.text_color || defaultConfig.text_color;
      });
      document.querySelectorAll('.msg-user').forEach(el => {
        el.style.background = config.header_color || defaultConfig.header_color;
      });
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.header_color || defaultConfig.header_color, set: (v) => { config.header_color = v; window.elementSdk.setConfig({ header_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: undefined
    }),
    mapToEditPanelValues: (config) => new Map([
      ["welcome_message", config.welcome_message || defaultConfig.welcome_message],
      ["company_tagline", config.company_tagline || defaultConfig.company_tagline],
    ])
  });

  // Data SDK
  await window.dataSdk.init({
    onDataChanged(data) {
      allRecords = data;
      // Restore chat from persisted data if page reloads and chat is empty
      if (chatHistory.length === 0 && data.length > 0) {
        const sorted = [...data].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        document.getElementById('messagesList').innerHTML = '';
        sorted.forEach(rec => {
          addMessage(rec.role, rec.content, false);
          chatHistory.push({ role: rec.role, content: rec.content });
        });
        document.getElementById('quickActions').classList.add('hidden');
      }
    }
  });

  // Show welcome if no history
  if (chatHistory.length === 0) {
    const welcome = (window.elementSdk.config && window.elementSdk.config.welcome_message) || defaultConfig.welcome_message;
    addMessage('assistant', welcome);
  }

  // Setup events
  document.getElementById('micBtn').addEventListener('click', toggleListening);

  setupSpeechRecognition();
  if ('speechSynthesis' in window) window.speechSynthesis.getVoices();

  createLucideIcons();
})();
